name: release

# Build cross-platform binaries and publish a GitHub Release whenever a version
# tag (e.g. v1.0.0) is pushed. Builds run in parallel; a single downstream job
# publishes the release so there is no race on the release object.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          # Version-less asset names so /releases/latest/download/<name> permalinks are stable.
          name="sailor-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o sailor ./cmd/sailor
          tar czf "${name}.tar.gz" sailor
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sailor-*.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
